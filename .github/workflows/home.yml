name: 🏠 Frontend CI (Home)

on:
  pull_request:
    paths:
      - "apps/home/**"

permissions:
  contents: read
  pull-requests: write
  deployments: write
  statuses: write

env:
  TURBO_CACHE: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'local:,remote:r' || 'local:,remote:rw' }}
  TURBO_TELEMETRY_DISABLED: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: "!contains(github.event.pull_request.labels.*.name, 'autorelease: pending')"
    name: 🧼 Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/setup-turbo
        with:
          token: ${{ secrets.TURBO_TOKEN }}
          team: ${{ secrets.TURBO_TEAM }}
      - name: 🧼 Run Biome Check
        run: pnpm turbo run home#check:lint --cache="${{env.TURBO_CACHE}}"

  typecheck:
    name: 🧠 Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/setup-turbo
        with:
          token: ${{ secrets.TURBO_TOKEN }}
          team: ${{ secrets.TURBO_TEAM }}
      - name: 🧠 Run TS Check
        run: pnpm turbo run home#check:types --cache="${{env.TURBO_CACHE}}"

  knip:
    name: 🪓 Check Unused Code (knip)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/setup-turbo
        with:
          token: ${{ secrets.TURBO_TOKEN }}
          team: ${{ secrets.TURBO_TEAM }}
      - name: 🪓 Run Knip
        run: pnpm turbo run home#check:knip --cache="${{env.TURBO_CACHE}}"

  depcheck:
    name: 📦 Check Unused Dependencies
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/setup-turbo
        with:
          token: ${{ secrets.TURBO_TOKEN }}
          team: ${{ secrets.TURBO_TEAM }}
      - name: 📦 Run depcheck
        run: pnpm turbo run home#check:dep --cache="${{env.TURBO_CACHE}}"

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [knip, depcheck]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/setup-turbo
        with:
          token: ${{ secrets.TURBO_TOKEN }}
          team: ${{ secrets.TURBO_TEAM }}
      - name: 🏗️ Build Home
        run: pnpm turbo run home#build --cache="${{env.TURBO_CACHE}}"
