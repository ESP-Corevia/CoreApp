name: 🧾 PR Title Lint

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  PrTitleLint:
    if: "!contains(github.event.pull_request.labels.*.name, 'autorelease: pending')"
    name: ✅ Lint PR Title
    uses: ESP-Corevia/.github/.github/workflows/pr-message-lint.yml@master
    permissions:
      contents: read
      pull-requests: read
