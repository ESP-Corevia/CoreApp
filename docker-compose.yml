name: Corevia

services:
  postgres:
    image: postgres:17-alpine
    container_name: Corevia-postgres
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-Corevia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - Corevia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  server:
    profiles:
      - server
      - web
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: server
    container_name: Corevia-server
    env_file:
      - ./.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://server:3000}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: migrate
    container_name: Corevia-migrate
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  seed:
    profiles:
      - seed
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: seed
    container_name: Corevia-seed
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - backend

  web:
    profiles:
      - web
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://localhost:3000}
    container_name: Corevia-web
    environment:
      NODE_ENV: production
    ports:
      - "80:8080"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:latest
    container_name: Corevia-drizzle-gateway
    restart: unless-stopped
    ports:
      - "4983:4983"
    environment:
      PORT: 4983
      STORE_PATH: "/data"
      MASTERPASS: ${MASTERPASS:?MASTERPASS is required}
    volumes:
      - drizzle-gateway:/data
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  Corevia_postgres_data:
  drizzle-gateway:
